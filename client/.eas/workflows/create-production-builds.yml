name: Create Production Builds

on:
  push:
    branches: ['main']

jobs:
  build_android:
    type: build
    params:
      platform: android

  # submit_android:
  #   name: Submit to Play Store
  #   type: submit
  #   needs: [build_android]
  #   params:
  #     build_id: ${{ needs.build_android.outputs.build_id }}
  #     profile: production

  build_ios:
    type: build
    params:
      platform: ios

  # submit_ios:
  #   name: Submit to App Store
  #   type: submit
  #   needs: [build_ios]
  #   params:
  #     build_id: ${{ needs.build_ios.outputs.build_id }}
  #     profile: production

  testflight:
    name: Distribute to TestFlight
    type: testflight
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      internal_groups: ['Testers']
      changelog: |
        What's new in this release:
        - New features
        - Bug fixes
